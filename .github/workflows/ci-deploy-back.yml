name: Back CI & Deploy

on:
  pull_request:
    paths:
      - '**'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Back CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl, pdo, pdo_sqlite, pcntl
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  deploy:
    name: Deploy back
    needs: ci
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy back over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            if [ ! -d "${{ secrets.SERVER_PROJECT_PATH }}/.git" ]; then
              mkdir -p "$(dirname "${{ secrets.SERVER_PROJECT_PATH }}")"
              git clone "${{ secrets.REPO_URL }}" "${{ secrets.SERVER_PROJECT_PATH }}"
            fi
            cd "${{ secrets.SERVER_PROJECT_PATH }}"
            git fetch --all --prune
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"
            docker compose pull || true
            docker compose up -d --build app nginx
            docker compose exec -T app composer install --no-interaction --prefer-dist --optimize-autoloader
            docker compose exec -T app php -r "file_exists('.env') || copy('.env.example', '.env');"
            docker compose exec -T app php artisan key:generate --force || true
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan optimize
            docker compose up -d worker scheduler
            docker compose --profile horizon up -d horizon || true
