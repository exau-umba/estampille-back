services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: estampille-back-app
    container_name: estampille-back-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: estampille-back-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: estampille-back-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: estampille
      POSTGRES_USER: estampille
      POSTGRES_PASSWORD: estampille
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: estampille-back-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    image: estampille-back-app
    container_name: estampille-back-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php -d memory_limit=1024M artisan queue:work redis --sleep=1 --tries=1 --timeout=7200
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - postgres

  scheduler:
    image: estampille-back-app
    container_name: estampille-back-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - postgres

  horizon:
    image: estampille-back-app
    container_name: estampille-back-horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php -d memory_limit=1024M artisan horizon
    profiles:
      - horizon
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - postgres

volumes:
  postgres_data:
  redis_data:
